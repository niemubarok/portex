services:
  # 1. Backend (Go API)
  - type: web
    name: portex-api
    env: go
    rootDir: app/apps/api
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard from Supabase
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: portex-redis
          property: connectionString
      - key: APP_PORT
        value: 8080

  # 2. Frontend (React/Vite)
  - type: static
    name: portex-web
    rootDir: app/apps/web
    buildCommand: pnpm install && pnpm build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: portex-api
          property: host

  # 3. Redis (Render Key Value)
  - type: keyvalue
    name: portex-redis
    plan: free
    ipAllowList: [] # Only allow internal access
